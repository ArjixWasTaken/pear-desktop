name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          ref: master
          fetch-depth: 0
          clean: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global push.autoSetupRemote true

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/pear-devs/pear-desktop
          git fetch upstream
          git merge upstream/master -X ours || true
          git diff --name-only --diff-filter=U | while read file; do
              git rm -f "$file"
          done
          git commit -m "Auto-resolve merge conflicts (prefer deletions)" || true
          git branch -M upstream
          git push origin HEAD --force

      - name: Create or update Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = 'upstream';
            const base = 'master';

            // Check if PR already exists
            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
            });

            if (pullRequests.length > 0) {
              console.log(`PR already exists: ${pullRequests[0].html_url}`);
            } else {
                try {
                      const { data: pr } = await github.rest.pulls.create({
                        owner,
                        repo,
                        title: '[chore]: sync with upstream',
                        body: 'This PR automatically pulls the latest commits from the upstream repository.',
                        head,
                        base,
                      });
                      console.log(`Created PR: ${pr.html_url}`);
                } catch (e) {
                    if (`${e}`.includes('Validation Failed')) {}
                    else throw e;
                }
            }
